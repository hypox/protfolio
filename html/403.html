<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Toegang Geweigerd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="../favicon/favicon.svg">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-content {
            text-align: center;
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-icon {
            font-size: 5rem;
            color: #ff6b6b;
            margin-bottom: 2rem;
            animation: shake 2s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .btn-home {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8f94fb 100%);
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(78, 84, 200, 0.3);
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="error-container">
        <div class="error-content">
            <i class="bi bi-shield-lock error-icon"></i>
            <div class="error-code">403</div>
            <h1 class="mb-3">Toegang Geweigerd</h1>
            <p class="text-muted mb-4">
                Je hebt geen toestemming om deze pagina te bekijken.
                Als je denkt dat dit een fout is, neem dan contact op.
            </p>
            
            <div class="d-flex gap-3 justify-content-center">
                <a href="index.html" class="btn btn-primary btn-home">
                    <i class="bi bi-house-door me-2"></i>
                    Terug naar Home
                </a>
                <a href="login.html" class="btn btn-outline-primary">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Inloggen
                </a>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
