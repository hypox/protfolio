<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Pagina Niet Gevonden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="../favicon/favicon.svg">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-content {
            text-align: center;
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color) 0%, #8f94fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .btn-home {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8f94fb 100%);
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(78, 84, 200, 0.3);
        }
        .suggestions {
            margin-top: 2rem;
            text-align: left;
        }
        .suggestions a {
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            transition: transform 0.2s ease;
        }
        .suggestions a:hover {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="error-container">
        <div class="error-content">
            <i class="bi bi-emoji-frown error-icon"></i>
            <div class="error-code">404</div>
            <h1 class="mb-3">Oeps! Pagina Niet Gevonden</h1>
            <p class="text-muted mb-4">
                De pagina die je zoekt bestaat niet of is verplaatst. 
                Geen zorgen, we helpen je graag op weg!
            </p>
            
            <a href="index.html" class="btn btn-primary btn-home mb-4">
                <i class="bi bi-house-door me-2"></i>
                Terug naar Home
            </a>

            <div class="suggestions">
                <h5 class="mb-3">Populaire Pagina's:</h5>
                <a href="index.html#about">
                    <i class="bi bi-person"></i>
                    Over Mij
                </a>
                <a href="index.html#skills">
                    <i class="bi bi-code-slash"></i>
                    Vaardigheden
                </a>
                <a href="index.html#projects">
                    <i class="bi bi-folder"></i>
                    Projecten
                </a>
                <a href="index.html#contact">
                    <i class="bi bi-envelope"></i>
                    Contact
                </a>
                <a href="login.html">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Login
                </a>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
